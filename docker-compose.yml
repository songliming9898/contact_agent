version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: contract_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: contract_agent
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contract_backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root123
      - MYSQL_DATABASE=contract_agent
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-sk-xxxxxxxxxxxx}
      - LLM_MODEL=${LLM_MODEL:-qwen-plus}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-contract-agent-secret-key-2026}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./contracts:/app/contracts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: contract_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
